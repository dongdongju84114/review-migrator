name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "review_migrator/**"
      - "tools/**"
      - "scripts/build_windows_exe.ps1"
      - "pyproject.toml"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build-windows-exe:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,windows-build]"

      - name: Run tests
        run: python -m pytest

      - name: Build Windows EXE
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Content -Path build\workflow_marker.txt -Value "Build step started"
          $pyinstallerArgs = @(
            "-m", "PyInstaller",
            "--noconfirm",
            "--clean",
            "--onefile",
            "--windowed",
            "--name", "ReviewMigratorGUI",
            "--collect-submodules", "openpyxl",
            "--collect-submodules", "pandas",
            "--collect-submodules", "pydantic",
            "--collect-submodules", "dotenv",
            "--hidden-import", "tkinter",
            "tools/windows_gui_launcher.py"
          )
          python @pyinstallerArgs *> build\pyinstaller_full.log
          $exitCode = $LASTEXITCODE
          if ($null -eq $exitCode) {
            $exitCode = 1
          }
          Set-Content -Path build\pyinstaller_exit_code.txt -Value $exitCode
          if ($exitCode -ne 0) {
            Get-Content build\pyinstaller_full.log -Tail 80
          }
          exit 0

      - name: Upload Windows build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: build/**
          if-no-files-found: ignore

      - name: Fail if Windows build failed
        shell: powershell
        run: |
          if (-not (Test-Path build\pyinstaller_exit_code.txt)) {
            Write-Host "::error title=Windows build did not start::build\pyinstaller_exit_code.txt was not created"
            exit 1
          }
          $exitCode = (Get-Content build\pyinstaller_exit_code.txt).Trim()
          if ($exitCode -ne "0") {
            $tail = Get-Content build\pyinstaller_full.log -Tail 40 | Out-String
            $tail = $tail.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=PyInstaller failed::$tail"
            exit [int]$exitCode
          }

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: ReviewMigratorGUI-windows
          path: dist/ReviewMigratorGUI.exe

      - name: Smoke test built EXE
        shell: powershell
        run: .\dist\ReviewMigratorGUI.exe --smoke-test
