name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "review_migrator/**"
      - "tools/**"
      - "scripts/build_windows_exe.ps1"
      - "pyproject.toml"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,windows-build]"

      - name: Run tests
        run: python -m pytest

      - name: Build Windows EXE
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $pyinstallerArgs = @(
            "-m", "PyInstaller",
            "--noconfirm",
            "--clean",
            "--onefile",
            "--windowed",
            "--name", "ReviewMigratorGUI",
            "--collect-submodules", "openpyxl",
            "--collect-submodules", "pandas",
            "--collect-submodules", "pydantic",
            "--collect-submodules", "dotenv",
            "--hidden-import", "tkinter",
            "tools/windows_gui_launcher.py"
          )
          try {
            $process = Start-Process `
              -FilePath python `
              -ArgumentList $pyinstallerArgs `
              -RedirectStandardOutput build\pyinstaller_stdout.log `
              -RedirectStandardError build\pyinstaller_stderr.log `
              -NoNewWindow `
              -Wait `
              -PassThru
            Set-Content -Path build\pyinstaller_exit_code.txt -Value $process.ExitCode
          } catch {
            $_ | Out-File -FilePath build\pyinstaller_stderr.log -Encoding utf8
            Set-Content -Path build\pyinstaller_exit_code.txt -Value 1
          }
          exit 0

      - name: Upload Windows build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: build/*

      - name: Fail if Windows build failed
        shell: powershell
        run: |
          $exitCode = (Get-Content build\pyinstaller_exit_code.txt).Trim()
          if ($exitCode -ne "0") {
            $tail = Get-Content build\pyinstaller_stderr.log -Tail 40 | Out-String
            $tail = $tail.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=PyInstaller failed::$tail"
            exit [int]$exitCode
          }

      - name: Smoke test built EXE
        shell: powershell
        run: .\dist\ReviewMigratorGUI.exe --smoke-test

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: ReviewMigratorGUI-windows
          path: dist/ReviewMigratorGUI.exe
